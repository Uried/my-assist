<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapports - MyAssist</title>
    <link rel="stylesheet" href="dist/output.css">
    <link rel="stylesheet" href="assets/css/design-tokens.css">
    <link rel="stylesheet" href="assets/css/loader.css">
</head>
<body class="min-h-screen" style="background-image: url('assets/img/v882batch2-kul-03.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat;">
    <!-- Navigation Header -->
    <header class="bg-white shadow-card px-6 py-4 sticky top-0 z-50">
        <div class="flex items-center justify-between max-w-7xl mx-auto">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-purple-500 rounded-xl flex items-center justify-center">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                </div>
                <span class="text-xl font-bold text-[#1A1A2E]">MyAssist</span>
            </div>
            <nav class="hidden md:flex items-center space-x-1">
                <a href="dashboard.html" class="px-4 py-2 rounded-xl text-[#3D3D5C] hover:bg-[#F5F5FA] transition-colors">Dashboard</a>
                <a href="courriers.html" class="px-4 py-2 rounded-xl text-[#3D3D5C] hover:bg-[#F5F5FA] transition-colors">Courriers</a>
                <a href="rendez-vous.html" class="px-4 py-2 rounded-xl text-[#3D3D5C] hover:bg-[#F5F5FA] transition-colors">Rendez-vous</a>
                <a href="contacts.html" class="px-4 py-2 rounded-xl text-[#3D3D5C] hover:bg-[#F5F5FA] transition-colors">Contacts</a>
                <a href="documents.html" class="px-4 py-2 rounded-xl text-[#3D3D5C] hover:bg-[#F5F5FA] transition-colors">Documents</a>
                <a href="rapports.html" class="px-4 py-2 rounded-xl text-[#7C6FF7] bg-purple-100 font-medium">Rapports</a>
                <a href="utilisateurs.html" class="px-4 py-2 rounded-xl text-[#3D3D5C] hover:bg-[#F5F5FA] transition-colors">Utilisateurs</a>
                <a href="parametres.html" class="px-4 py-2 rounded-xl text-[#3D3D5C] hover:bg-[#F5F5FA] transition-colors">Paramètres</a>
            </nav>
            <div class="flex items-center space-x-3">
                <button onclick="window.print()" class="bg-purple-500 text-white px-4 py-2 rounded-xl font-semibold hover:bg-purple-600 focus:ring-4 focus:ring-purple-200 transition-all flex items-center space-x-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path>
                    </svg>
                    <span>Imprimer</span>
                </button>
                <div class="w-10 h-10 bg-purple-100 rounded-full flex items-center justify-center">
                    <svg class="w-6 h-6 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                </div>
                <button class="logout-button hidden md:flex items-center space-x-2 px-4 py-2 rounded-xl text-[#3D3D5C] hover:bg-[#F5F5FA] transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                    </svg>
                    <span>Déconnexion</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Page Content -->
    <main class="p-6 max-w-7xl mx-auto">
                <!-- Filters -->
                <div class="bg-white rounded-[26px] shadow-card p-6 mb-4">
                    <div class="flex flex-col lg:flex-row gap-4 items-end">
                        <div>
                            <label class="block text-sm font-medium text-[#3D3D5C] mb-2">Période</label>
                            <select id="filter-period" class="px-4 py-3 bg-[#F5F5FA] rounded-xl focus:ring-2 focus:ring-purple-500 focus:outline-none">
                                <option value="all">Toute la période</option>
                                <option value="today">Aujourd'hui</option>
                                <option value="week">Cette semaine</option>
                                <option value="month">Ce mois</option>
                                <option value="year">Cette année</option>
                            </select>
                        </div>
                        <button onclick="Rapports.loadStats()" class="bg-purple-500 text-white px-6 py-3 rounded-xl font-semibold hover:bg-purple-600 focus:ring-4 focus:ring-purple-200 transition-all">
                            Actualiser
                        </button>
                        <button onclick="Rapports.exportToExcel()" class="bg-green-500 text-white px-6 py-3 rounded-xl font-semibold hover:bg-green-600 focus:ring-4 focus:ring-green-200 transition-all flex items-center space-x-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                            </svg>
                            <span>Exporter Excel</span>
                        </button>
                    </div>
                </div>

                <!-- Global Stats -->
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-4">
                    <div class="bg-white rounded-[26px] shadow-card p-6">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-sm text-[#9999B3] mb-1">Total courriers</p>
                                <p id="stat-total-courriers" class="text-3xl font-bold text-[#1A1A2E]">0</p>
                            </div>
                            <div class="w-12 h-12 bg-purple-100 rounded-xl flex items-center justify-center">
                                <svg class="w-6 h-6 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                                </svg>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-[26px] shadow-card p-6">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-sm text-[#9999B3] mb-1">Total rendez-vous</p>
                                <p id="stat-total-rendezvous" class="text-3xl font-bold text-[#1A1A2E]">0</p>
                            </div>
                            <div class="w-12 h-12 bg-green-100 rounded-xl flex items-center justify-center">
                                <svg class="w-6 h-6 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                                </svg>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-[26px] shadow-card p-6">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-sm text-[#9999B3] mb-1">Total contacts</p>
                                <p id="stat-total-contacts" class="text-3xl font-bold text-[#1A1A2E]">0</p>
                            </div>
                            <div class="w-12 h-12 bg-orange-100 rounded-xl flex items-center justify-center">
                                <svg class="w-6 h-6 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                                </svg>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-[26px] shadow-card p-6">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-sm text-[#9999B3] mb-1">Total documents</p>
                                <p id="stat-total-documents" class="text-3xl font-bold text-[#1A1A2E]">0</p>
                            </div>
                            <div class="w-12 h-12 bg-yellow-100 rounded-xl flex items-center justify-center">
                                <svg class="w-6 h-6 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Stats by Status -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">
                    <div class="bg-white rounded-[26px] shadow-card">
                        <div class="p-6">
                            <h2 class="text-lg font-semibold text-[#1A1A2E] mb-4">Courriers par statut</h2>
                            <div class="h-64">
                                <canvas id="courriers-chart"></canvas>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-[26px] shadow-card">
                        <div class="p-6">
                            <h2 class="text-lg font-semibold text-[#1A1A2E] mb-4">Rendez-vous par statut</h2>
                            <div class="h-64">
                                <canvas id="rendezvous-chart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Additional Charts -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                    <div class="bg-white rounded-[26px] shadow-card">
                        <div class="p-6">
                            <h2 class="text-lg font-semibold text-[#1A1A2E] mb-4">Contacts par type</h2>
                            <div class="h-64">
                                <canvas id="contacts-chart"></canvas>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-[26px] shadow-card">
                        <div class="p-6">
                            <h2 class="text-lg font-semibold text-[#1A1A2E] mb-4">Documents par catégorie</h2>
                            <div class="h-64">
                                <canvas id="documents-chart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            </main>

    <script src="assets/js/storage.js"></script>
    <script src="assets/js/airtable.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/loader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="assets/js/rapports.js"></script>
    <script>
        Auth.checkAuth();
        App.init();
        Rapports.init();
    </script>
</body>
</html>
