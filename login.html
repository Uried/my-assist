<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - MyAssist</title>
    <link rel="stylesheet" href="dist/output.css">
    <link rel="stylesheet" href="assets/css/design-tokens.css">
</head>
<body class="min-h-screen flex items-center justify-center" style="background-image: url('assets/img/v882batch2-kul-03.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat;">
    <div class="bg-white rounded-[26px] shadow-card p-8 w-full max-w-md mx-4">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-purple-100 rounded-[26px] mb-4">
                <svg class="w-8 h-8 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-[#1A1A2E]">MyAssist</h1>
            <p class="text-[#9999B3] mt-2">Gestion de tâches assistante de direction</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-medium text-[#3D3D5C] mb-2">Email</label>
                <input type="email" id="email" name="email" required
                    class="w-full px-4 py-3 bg-[#F5F5FA] rounded-xl focus:ring-2 focus:ring-purple-500 focus:outline-none transition-all"
                    placeholder="admin@myassist.local">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-[#3D3D5C] mb-2">Mot de passe</label>
                <input type="password" id="password" name="password" required
                    class="w-full px-4 py-3 bg-[#F5F5FA] rounded-xl focus:ring-2 focus:ring-purple-500 focus:outline-none transition-all"
                    placeholder="••••••••">
            </div>

            <div id="error-message" class="hidden bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl text-sm">
                Email ou mot de passe incorrect
            </div>

            <button type="submit"
                class="w-full bg-purple-500 text-white py-3 px-4 rounded-xl font-semibold hover:bg-purple-600 focus:ring-4 focus:ring-purple-200 transition-all">
                Se connecter
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-[#9999B3]">
            <p>Compte par défaut : admin@myassist.local / Admin123!</p>
            <a href="config.html" class="block mt-2 text-purple-500 hover:text-purple-600">
                Configurer Airtable
            </a>
        </div>
    </div>

    <script src="assets/js/storage.js"></script>
    <script src="assets/js/airtable.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        // Initialiser l'admin par défaut
        Auth.initDefaultAdmin();

        // Gérer la connexion
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('error-message');
            
            const user = await Auth.login(email, password);
            
            if (user) {
                window.location.href = 'dashboard.html';
            } else {
                errorMessage.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
