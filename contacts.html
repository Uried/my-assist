<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacts - MyAssist</title>
    <link rel="stylesheet" href="dist/output.css">
    <link rel="stylesheet" href="assets/css/design-tokens.css">
</head>
<body class="min-h-screen" style="background-image: url('assets/img/v882batch2-kul-03.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat;">
    <!-- Navigation Header -->
    <header class="bg-white shadow-card px-6 py-4 sticky top-0 z-50">
        <div class="flex items-center justify-between max-w-7xl mx-auto">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-purple-500 rounded-xl flex items-center justify-center">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                </div>
                <span class="text-xl font-bold text-[#1A1A2E]">MyAssist</span>
            </div>
            <nav class="hidden md:flex items-center space-x-1">
                <a href="dashboard.html" class="px-4 py-2 rounded-xl text-[#3D3D5C] hover:bg-[#F5F5FA] transition-colors">Dashboard</a>
                <a href="courriers.html" class="px-4 py-2 rounded-xl text-[#3D3D5C] hover:bg-[#F5F5FA] transition-colors">Courriers</a>
                <a href="rendez-vous.html" class="px-4 py-2 rounded-xl text-[#3D3D5C] hover:bg-[#F5F5FA] transition-colors">Rendez-vous</a>
                <a href="contacts.html" class="px-4 py-2 rounded-xl text-[#7C6FF7] bg-purple-100 font-medium">Contacts</a>
                <a href="documents.html" class="px-4 py-2 rounded-xl text-[#3D3D5C] hover:bg-[#F5F5FA] transition-colors">Documents</a>
                <a href="rapports.html" class="px-4 py-2 rounded-xl text-[#3D3D5C] hover:bg-[#F5F5FA] transition-colors">Rapports</a>
                <a href="utilisateurs.html" class="px-4 py-2 rounded-xl text-[#3D3D5C] hover:bg-[#F5F5FA] transition-colors">Utilisateurs</a>
                <a href="parametres.html" class="px-4 py-2 rounded-xl text-[#3D3D5C] hover:bg-[#F5F5FA] transition-colors">Paramètres</a>
            </nav>
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-purple-100 rounded-full flex items-center justify-center">
                    <svg class="w-6 h-6 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                </div>
                <button class="logout-button hidden md:flex items-center space-x-2 px-4 py-2 rounded-xl text-[#3D3D5C] hover:bg-[#F5F5FA] transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                    </svg>
                    <span>Déconnexion</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Page Content -->
    <main class="p-6 max-w-7xl mx-auto">
        <div class="bg-white rounded-[26px] shadow-card p-6 mb-4">
                    <div class="flex flex-col lg:flex-row gap-4">
                        <div class="flex-1">
                            <input type="text" id="search-input" placeholder="Rechercher un contact..."
                                class="w-full px-4 py-3 bg-[#F5F5FA] rounded-xl focus:ring-2 focus:ring-purple-500 focus:outline-none">
                        </div>
                        <div class="flex gap-4">
                            <select id="filter-type" class="px-4 py-3 bg-[#F5F5FA] rounded-xl focus:ring-2 focus:ring-purple-500 focus:outline-none">
                                <option value="">Tous les types</option>
                                <option value="client">Client</option>
                                <option value="partenaire">Partenaire</option>
                                <option value="fournisseur">Fournisseur</option>
                                <option value="personnel">Personnel</option>
                                <option value="autre">Autre</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="mb-4">
                    <button onclick="Contacts.openModal()" class="bg-purple-500 text-white px-6 py-3 rounded-xl font-semibold hover:bg-purple-600 focus:ring-4 focus:ring-purple-200 transition-all flex items-center space-x-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                        </svg>
                        <span>Nouveau contact</span>
                    </button>
                </div>

                <div class="bg-white rounded-[26px] shadow-card overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead class="bg-[#F5F5FA]">
                                <tr>
                                    <th class="px-6 py-4 text-left text-xs font-semibold text-[#9999B3] uppercase tracking-wider">Nom</th>
                                    <th class="px-6 py-4 text-left text-xs font-semibold text-[#9999B3] uppercase tracking-wider">Organisation</th>
                                    <th class="px-6 py-4 text-left text-xs font-semibold text-[#9999B3] uppercase tracking-wider">Fonction</th>
                                    <th class="px-6 py-4 text-left text-xs font-semibold text-[#9999B3] uppercase tracking-wider">Téléphone</th>
                                    <th class="px-6 py-4 text-left text-xs font-semibold text-[#9999B3] uppercase tracking-wider">Email</th>
                                    <th class="px-6 py-4 text-left text-xs font-semibold text-[#9999B3] uppercase tracking-wider">Type</th>
                                    <th class="px-6 py-4 text-left text-xs font-semibold text-[#9999B3] uppercase tracking-wider">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="contacts-table-body" class="divide-y divide-gray-100">
                                <tr>
                                    <td colspan="7" class="px-6 py-8 text-center text-[#9999B3]">Chargement...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>

    <!-- Modal -->
    <div id="contact-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-[26px] shadow-dark w-full max-w-2xl max-h-[90vh] overflow-y-auto">
            <div class="p-6 flex justify-between items-center">
                <h2 id="modal-title" class="text-xl font-bold text-[#1A1A2E]">Nouveau contact</h2>
                <button onclick="Contacts.closeModal()" class="p-2 hover:bg-[#F5F5FA] rounded-xl">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <form id="contact-form" class="p-6 space-y-4">
                <input type="hidden" id="contact-id">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-[#3D3D5C] mb-2">Nom *</label>
                        <input type="text" id="contact-nom" required class="w-full px-4 py-3 bg-[#F5F5FA] rounded-xl focus:ring-2 focus:ring-purple-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-[#3D3D5C] mb-2">Prénom *</label>
                        <input type="text" id="contact-prenom" required class="w-full px-4 py-3 bg-[#F5F5FA] rounded-xl focus:ring-2 focus:ring-purple-500 focus:outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-[#3D3D5C] mb-2">Organisation</label>
                        <input type="text" id="contact-organisation" class="w-full px-4 py-3 bg-[#F5F5FA] rounded-xl focus:ring-2 focus:ring-purple-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-[#3D3D5C] mb-2">Fonction</label>
                        <input type="text" id="contact-fonction" class="w-full px-4 py-3 bg-[#F5F5FA] rounded-xl focus:ring-2 focus:ring-purple-500 focus:outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-[#3D3D5C] mb-2">Téléphone</label>
                        <input type="tel" id="contact-telephone" class="w-full px-4 py-3 bg-[#F5F5FA] rounded-xl focus:ring-2 focus:ring-purple-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-[#3D3D5C] mb-2">Email</label>
                        <input type="email" id="contact-email" class="w-full px-4 py-3 bg-[#F5F5FA] rounded-xl focus:ring-2 focus:ring-purple-500 focus:outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-[#3D3D5C] mb-2">Adresse</label>
                    <input type="text" id="contact-adresse" class="w-full px-4 py-3 bg-[#F5F5FA] rounded-xl focus:ring-2 focus:ring-purple-500 focus:outline-none">
                </div>

                <div>
                    <label class="block text-sm font-medium text-[#3D3D5C] mb-2">Type de contact *</label>
                    <select id="contact-typeContact" required class="w-full px-4 py-3 bg-[#F5F5FA] rounded-xl focus:ring-2 focus:ring-purple-500 focus:outline-none">
                        <option value="">Sélectionner</option>
                        <option value="client">Client</option>
                        <option value="partenaire">Partenaire</option>
                        <option value="fournisseur">Fournisseur</option>
                        <option value="personnel">Personnel</option>
                        <option value="autre">Autre</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-[#3D3D5C] mb-2">Notes</label>
                    <textarea id="contact-notes" rows="3" class="w-full px-4 py-3 bg-[#F5F5FA] rounded-xl focus:ring-2 focus:ring-purple-500 focus:outline-none"></textarea>
                </div>

                <div class="flex justify-end space-x-4 pt-4">
                    <button type="button" onclick="Contacts.closeModal()" class="px-6 py-3 border border-gray-200 rounded-xl font-semibold hover:bg-[#F5F5FA] transition-colors">Annuler</button>
                    <button type="submit" class="px-6 py-3 bg-purple-500 text-white rounded-xl font-semibold hover:bg-purple-600 focus:ring-4 focus:ring-purple-200 transition-colors">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <script src="assets/js/storage.js"></script>
    <script src="assets/js/airtable.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/contacts.js"></script>
    <script>
        Auth.checkAuth();
        App.init();
        Contacts.init();
    </script>
</body>
</html>
