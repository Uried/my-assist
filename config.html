<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuration - MyAssist</title>
    <link rel="stylesheet" href="dist/output.css">
    <link rel="stylesheet" href="assets/css/design-tokens.css">
</head>
<body class="min-h-screen flex items-center justify-center" style="background-image: url('assets/img/v882batch2-kul-03.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat;">
    <div class="bg-white rounded-[26px] shadow-card p-8 w-full max-w-md mx-4">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-[#1A1A2E] mb-2">Configuration Airtable</h1>
            <p class="text-[#9999B3]">Configurez vos credentials Airtable</p>
        </div>

        <form id="config-form" class="space-y-6">
            <div>
                <label for="airtable-token" class="block text-sm font-medium text-[#3D3D5C] mb-2">Personal Access Token</label>
                <input type="text" id="airtable-token" name="airtable-token" required
                    class="w-full px-4 py-3 bg-[#F5F5FA] rounded-xl focus:ring-2 focus:ring-purple-500 focus:outline-none transition-all"
                    placeholder="pat...">
            </div>

            <div>
                <label for="airtable-base" class="block text-sm font-medium text-[#3D3D5C] mb-2">Base ID</label>
                <input type="text" id="airtable-base" name="airtable-base" required
                    class="w-full px-4 py-3 bg-[#F5F5FA] rounded-xl focus:ring-2 focus:ring-purple-500 focus:outline-none transition-all"
                    placeholder="app...">
            </div>

            <div id="success-message" class="hidden bg-green-50 border border-green-200 text-green-600 px-4 py-3 rounded-xl text-sm">
                Configuration sauvegardée avec succès !
            </div>

            <button type="submit"
                class="w-full bg-purple-500 text-white py-3 px-4 rounded-xl font-semibold hover:bg-purple-600 focus:ring-4 focus:ring-purple-200 transition-all">
                Sauvegarder
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="index.html" class="text-sm text-purple-500 hover:text-purple-600">
                ← Retour à l'accueil
            </a>
        </div>
    </div>

    <script>
        document.getElementById('config-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const token = document.getElementById('airtable-token').value;
            const base = document.getElementById('airtable-base').value;
            const successMessage = document.getElementById('success-message');
            
            localStorage.setItem('AIRTABLE_TOKEN', token);
            localStorage.setItem('AIRTABLE_BASE', base);
            
            successMessage.classList.remove('hidden');
            
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        });

        // Pré-remplir si déjà configuré
        const existingToken = localStorage.getItem('AIRTABLE_TOKEN');
        const existingBase = localStorage.getItem('AIRTABLE_BASE');
        
        if (existingToken) {
            document.getElementById('airtable-token').value = existingToken;
        }
        if (existingBase) {
            document.getElementById('airtable-base').value = existingBase;
        }
    </script>
</body>
</html>
